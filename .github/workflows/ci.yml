name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite (pytest)
        run: python -m pytest

      - name: tessctl doctor (SHA-integrity gate)
        env:
          TESS_ROOT: ${{ github.workspace }}
        run: python3 .tess/bin/tessctl doctor

      - name: tessctl verify (security-tier gate)
        env:
          TESS_ROOT: ${{ github.workspace }}
        run: python3 .tess/bin/tessctl verify

  secret-scan:
    name: secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Run the gitleaks CLI directly. The gitleaks-action@v2 wrapper now requires
      # a paid GITLEAKS_LICENSE secret for GitHub *organization*-owned repos (this
      # repo is org-owned), so the wrapper is not used. The CLI is free and applies
      # the committed .gitleaks.toml allowlist to the full git history.
      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.1
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: gitleaks (full history)
        run: gitleaks git . --config .gitleaks.toml --redact --no-banner --exit-code 1
