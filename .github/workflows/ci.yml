name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Cancel superseded runs for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run test suite (pytest)
        run: python -m pytest

      - name: tessctl doctor (SHA-integrity gate)
        env:
          TESS_ROOT: ${{ github.workspace }}
        run: python3 .tess/bin/tessctl doctor

      - name: tessctl verify (security-tier gate)
        env:
          TESS_ROOT: ${{ github.workspace }}
        run: python3 .tess/bin/tessctl verify
